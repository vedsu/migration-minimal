version: 1.0
runtime: python311

build:
  commands:
    build:
      - python3 -m compileall app

run:
  runtime-version: 3.11
  pre-run:
    - pip3 install -r requirements.txt
  command: gunicorn --config /dev/null --bind 0.0.0.0:8080 --workers 1 --log-level debug --access-logfile - --error-logfile - --capture-output app:app
  network:
    port: 8080
